name: selftest

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-on-fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run action against fixture
        id: integrity
        uses: ./
        with:
          path: fixtures/pass
          strict: 'false'
        continue-on-error: true
      - name: Show outputs
        env:
          EXIT_CODE: ${{ steps.integrity.outputs.exit-code }}
          CRIT: ${{ steps.integrity.outputs.critical-count }}
          HIGH: ${{ steps.integrity.outputs.high-count }}
          BASE: ${{ steps.integrity.outputs.base-version }}
          TIER: ${{ steps.integrity.outputs.tier }}
          BADGE_JSON: ${{ steps.integrity.outputs.badge-json }}
        run: |
          echo "exit-code: $EXIT_CODE"
          echo "critical-count: $CRIT"
          echo "high-count: $HIGH"
          echo "base-version: $BASE"
          echo "tier: $TIER"
          echo "badge-json: $BADGE_JSON"
      - name: Assert fixture passed
        env:
          EXIT_CODE: ${{ steps.integrity.outputs.exit-code }}
          CRIT: ${{ steps.integrity.outputs.critical-count }}
        run: |
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Fixture should produce CLI exit 0; got $EXIT_CODE"
            exit 1
          fi
          if [ "$CRIT" != "0" ]; then
            echo "Fixture should produce 0 CRITICAL findings; got $CRIT"
            exit 1
          fi
